name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          cd cmd/scrutineer && go build \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o ../../scrutineer-${GOOS}-${GOARCH}${EXT} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scrutineer-${{ matrix.goos }}-${{ matrix.goarch }}
          path: scrutineer-*

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create source tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="scrutineer-${VERSION}/" HEAD \
            -o "artifacts/scrutineer-${VERSION}.src.tar.gz"

      - name: Install packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq rpm

      - name: Build .deb packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for ARCH in amd64 arm64; do
            BINARY="artifacts/scrutineer-linux-${ARCH}"
            if [ ! -f "$BINARY" ]; then continue; fi

            DEB_ARCH="${ARCH}"
            PKG_DIR="deb-${ARCH}"
            mkdir -p "${PKG_DIR}/DEBIAN"
            mkdir -p "${PKG_DIR}/usr/bin"
            mkdir -p "${PKG_DIR}/usr/share/doc/scrutineer"

            cp "$BINARY" "${PKG_DIR}/usr/bin/scrutineer"
            chmod 755 "${PKG_DIR}/usr/bin/scrutineer"
            cp LICENSE "${PKG_DIR}/usr/share/doc/scrutineer/copyright"

            cat > "${PKG_DIR}/DEBIAN/control" <<CTRL
          Package: scrutineer
          Version: ${VERSION}
          Section: devel
          Priority: optional
          Architecture: ${DEB_ARCH}
          Maintainer: Asymmetric Effort, LLC <scaldwell@asymmetric-effort.com>
          Description: Extensible test framework for CLI, API, and browser testing
           Scrutineer is a declarative YAML-based test framework for automating
           tests against CLI programs, REST APIs, GraphQL, gRPC, SSH, and web
           browsers. Built in Go with zero third-party dependencies.
          Homepage: https://scrutineer.asymmetric-effort.com
          CTRL

            dpkg-deb --build "${PKG_DIR}" "artifacts/scrutineer_${VERSION}_${DEB_ARCH}.deb"
          done

      - name: Build .rpm packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for ARCH in amd64 arm64; do
            BINARY="artifacts/scrutineer-linux-${ARCH}"
            if [ ! -f "$BINARY" ]; then continue; fi

            RPM_ARCH="${ARCH}"
            if [ "$ARCH" = "amd64" ]; then RPM_ARCH="x86_64"; fi
            if [ "$ARCH" = "arm64" ]; then RPM_ARCH="aarch64"; fi

            # Clean rpmbuild tree for each arch
            rm -rf rpmbuild
            mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
            cp "$BINARY" "rpmbuild/SOURCES/scrutineer"

            cat > "rpmbuild/SPECS/scrutineer-${ARCH}.spec" <<SPEC
          Name:           scrutineer
          Version:        ${VERSION}
          Release:        1
          Summary:        Extensible test framework for CLI, API, and browser testing
          License:        MIT
          URL:            https://scrutineer.asymmetric-effort.com
          BuildArch:      noarch
          %global __strip /bin/true
          %global __brp_strip /bin/true
          %global __brp_strip_static_archive /bin/true
          %global __brp_strip_comment_note /bin/true
          %define debug_package %{nil}

          %description
          Scrutineer is a declarative YAML-based test framework for automating
          tests against CLI programs, REST APIs, GraphQL, gRPC, SSH, and web
          browsers. Built in Go with zero third-party dependencies.

          %install
          mkdir -p %{buildroot}/usr/bin
          cp %{_sourcedir}/scrutineer %{buildroot}/usr/bin/scrutineer
          chmod 755 %{buildroot}/usr/bin/scrutineer

          %files
          /usr/bin/scrutineer
          SPEC

            rpmbuild --define "_topdir $(pwd)/rpmbuild" --define "_binaries_in_noarch_packages_terminate_build 0" -bb "rpmbuild/SPECS/scrutineer-${ARCH}.spec"
            # Rename to include actual target arch in filename
            find rpmbuild/RPMS -name "*.rpm" -exec sh -c 'cp "$1" "artifacts/scrutineer-${VERSION}-1.'"${RPM_ARCH}"'.rpm"' _ {} \;
          done

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/*

  release:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: asymmetric-effort/actions/actions/gh-release@main
        with:
          tag_name: ${{ github.ref_name }}
          name: "Scrutineer ${{ github.ref_name }}"
          generate_release_notes: "true"
          files: |
            artifacts/scrutineer-*
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.src.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
