name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          cd cmd/scrutineer && go build \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o ../../scrutineer-${GOOS}-${GOARCH}${EXT} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scrutineer-${{ matrix.goos }}-${{ matrix.goarch }}
          path: scrutineer-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: asymmetric-effort/actions/actions/gh-release@main
        with:
          tag_name: ${{ github.ref_name }}
          name: "Scrutineer ${{ github.ref_name }}"
          generate_release_notes: "true"
          files: |
            artifacts/scrutineer-*
          token: ${{ secrets.GITHUB_TOKEN }}
