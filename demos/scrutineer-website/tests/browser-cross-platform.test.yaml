suite: "Cross-Platform Section"
tags: [browser, platforms, ui]

tests:
  - name: "Cross-Platform heading exists"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "Array.from(document.querySelectorAll('h2')).find(h => h.textContent === 'Cross-Platform').textContent"
        assert:
          - body_raw: {equals: "Cross-Platform"}

  - name: "Subtitle says Build once, test everywhere"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "Array.from(document.querySelectorAll('.subtitle')).find(s => s.textContent.includes('Build once')).textContent"
        assert:
          - body_raw: {contains: "Build once, test everywhere"}

  - name: "Exactly 3 platform cards are displayed"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.platform-card').length"
        assert:
          - body_raw: {equals: 3}

  - name: "Linux platform card exists"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.platform-card h3')[0].textContent"
        assert:
          - body_raw: {equals: "Linux"}

  - name: "Linux shows AMD64 / ARM64"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.platform-card p')[0].textContent"
        assert:
          - body_raw: {contains: "AMD64"}
          - body_raw: {contains: "ARM64"}

  - name: "macOS platform card exists"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.platform-card h3')[1].textContent"
        assert:
          - body_raw: {equals: "macOS"}

  - name: "Windows platform card exists"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.platform-card h3')[2].textContent"
        assert:
          - body_raw: {equals: "Windows"}
