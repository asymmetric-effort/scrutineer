suite: "Features Section"
tags: [browser, features, ui]

tests:
  - name: "Features section exists with correct heading"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: wait_for_selector
        selector: "#features"
      - action: evaluate
        expression: "document.querySelector('#features h2').textContent"
        assert:
          - body_raw: {equals: "Features"}

  - name: "Features subtitle is present"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: get_text
        selector: "#features .subtitle"
        assert:
          - body_raw: {contains: "Everything you need for comprehensive testing"}

  - name: "Exactly 9 feature cards are displayed"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.feature-card').length"
        assert:
          - body_raw: {equals: 9}

  - name: "Declarative YAML Tests card"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.feature-card h3')[0].textContent"
        assert:
          - body_raw: {equals: "Declarative YAML Tests"}

  - name: "Modular Connectors card"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.feature-card h3')[1].textContent"
        assert:
          - body_raw: {equals: "Modular Connectors"}

  - name: "Browser Automation card"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.feature-card h3')[2].textContent"
        assert:
          - body_raw: {equals: "Browser Automation"}

  - name: "Load Testing card"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.feature-card h3')[3].textContent"
        assert:
          - body_raw: {equals: "Load Testing"}

  - name: "Nanosecond Telemetry card"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.feature-card h3')[4].textContent"
        assert:
          - body_raw: {equals: "Nanosecond Telemetry"}

  - name: "Zero Dependencies card"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.feature-card h3')[5].textContent"
        assert:
          - body_raw: {equals: "Zero Dependencies"}

  - name: "Coverage as a Feature card"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.feature-card h3')[6].textContent"
        assert:
          - body_raw: {equals: "Coverage as a Feature"}

  - name: "Fuzz Testing card"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.feature-card h3')[7].textContent"
        assert:
          - body_raw: {equals: "Fuzz Testing"}

  - name: "Rich Assertions card"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.feature-card h3')[8].textContent"
        assert:
          - body_raw: {equals: "Rich Assertions"}

  - name: "Each feature card has a description"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "Array.from(document.querySelectorAll('.feature-card p')).every(p => p.textContent.length > 10)"
        assert:
          - body_raw: {equals: true}

  - name: "Each feature card has an icon"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.feature-icon').length"
        assert:
          - body_raw: {equals: 9}
