suite: "HTTP Smoke Tests"
tags: [http, smoke]

tests:
  - name: "Site returns 200 OK"
    connector: http
    steps:
      - action: request
        method: GET
        path: /
        assert:
          - status: 200
          - elapsed: {less_than: 5s}
          - header.Content-Type: {contains: "text/html"}
          - body_raw: {contains: "scrutineer"}

  - name: "CSS asset loads"
    connector: http
    steps:
      - action: request
        method: GET
        path: /css/style.css
        assert:
          - status: 200
          - header.Content-Type: {contains: "text/css"}

  - name: "Logo asset loads"
    connector: http
    steps:
      - action: request
        method: GET
        path: /img/logo.png
        assert:
          - status: 200
          - header.Content-Type: {contains: "image/png"}

  - name: "404 for nonexistent path"
    connector: http
    steps:
      - action: request
        method: GET
        path: /does-not-exist
        assert:
          - status: 404
