suite: "Hero Section"
tags: [browser, hero, ui]

tests:
  - name: "Hero heading displays project name"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: wait_for_selector
        selector: ".hero h1"
      - action: get_text
        selector: ".hero h1"
        assert:
          - body_raw: {equals: "scrutineer"}

  - name: "Tagline describes the framework accurately"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: get_text
        selector: ".tagline"
        assert:
          - body_raw: {contains: "extensible test framework"}
          - body_raw: {contains: "CLI programs"}
          - body_raw: {contains: "REST APIs"}
          - body_raw: {contains: "GraphQL"}
          - body_raw: {contains: "gRPC"}
          - body_raw: {contains: "browsers"}
          - body_raw: {contains: "Declarative YAML tests"}
          - body_raw: {contains: "Zero third-party dependencies"}

  - name: "Go version badge is displayed"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelector('.badge-green').textContent"
        assert:
          - body_raw: {contains: "Go 1.26"}

  - name: "MIT License badge is displayed"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelector('.badge-blue').textContent"
        assert:
          - body_raw: {equals: "MIT License"}

  - name: "Version badge is displayed"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelector('.badge-orange').textContent"
        assert:
          - body_raw: {matches: "^v\\d+\\.\\d+"}

  - name: "Exactly 3 badges are displayed"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.badges .badge').length"
        assert:
          - body_raw: {equals: 3}

  - name: "Get Started CTA links to install section"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelector('.btn-primary').href"
        assert:
          - body_raw: {contains: "#install"}

  - name: "Get Started CTA has correct text"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: get_text
        selector: ".btn-primary"
        assert:
          - body_raw: {equals: "Get Started"}

  - name: "View Source CTA links to GitHub"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelector('.btn-secondary').href"
        assert:
          - body_raw: {contains: "github.com/asymmetric-effort/scrutineer"}

  - name: "View Source CTA has correct text"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: get_text
        selector: ".btn-secondary"
        assert:
          - body_raw: {equals: "View Source"}
