suite: "Install Section"
tags: [browser, install, ui]

tests:
  - name: "Install section exists with correct heading"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: wait_for_selector
        selector: "#install"
      - action: evaluate
        expression: "document.querySelector('#install h2').textContent"
        assert:
          - body_raw: {equals: "Install"}

  - name: "Install subtitle is present"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: get_text
        selector: "#install .subtitle"
        assert:
          - body_raw: {contains: "One command"}
          - body_raw: {contains: "No dependencies"}

  - name: "Go install command is displayed"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: get_text
        selector: ".install-block code"
        assert:
          - body_raw: {contains: "go install"}
          - body_raw: {contains: "github.com/asymmetric-effort/scrutineer"}
          - body_raw: {contains: "@latest"}

  - name: "Releases link is present"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelector('#install a[href*=\"releases\"]').textContent"
        assert:
          - body_raw: {equals: "Releases"}

  - name: "Releases link points to GitHub releases"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelector('#install a[href*=\"releases\"]').href"
        assert:
          - body_raw: {contains: "github.com/asymmetric-effort/scrutineer/releases"}

  - name: "Platform availability mentioned"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: get_text
        selector: "#install"
        assert:
          - body_raw: {contains: "Linux"}
          - body_raw: {contains: "macOS"}
          - body_raw: {contains: "Windows"}
          - body_raw: {contains: "AMD64"}
          - body_raw: {contains: "ARM64"}

  - name: "Quick start code block has correct header"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('.code-header')[1].textContent"
        assert:
          - body_raw: {equals: "Quick start"}

  - name: "Quick start shows browser install command"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('#install pre')[0].textContent"
        assert:
          - body_raw: {contains: "scrutineer browsers install"}

  - name: "Quick start shows run command"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('#install pre')[0].textContent"
        assert:
          - body_raw: {contains: "scrutineer run"}

  - name: "Quick start shows JSON format option"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('#install pre')[0].textContent"
        assert:
          - body_raw: {contains: "--format json"}

  - name: "Quick start shows log-dump command"
    connector: browser
    steps:
      - action: navigate
        url: "https://scrutineer.asymmetric-effort.com/"
      - action: evaluate
        expression: "document.querySelectorAll('#install pre')[0].textContent"
        assert:
          - body_raw: {contains: "scrutineer log-dump"}
