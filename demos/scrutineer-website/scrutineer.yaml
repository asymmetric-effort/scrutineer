version: "0.0.8"

tests:
  - demos/scrutineer-website/tests/http-smoke.test.yaml
  - demos/scrutineer-website/tests/browser-smoke.test.yaml

parallelism: 1
timeout: 30s

reporters:
  - type: ansi

connectors:
  http:
    base_url: "https://scrutineer.asymmetric-effort.com"
  browser:
    browser: chromium
    headless: true

telemetry:
  enabled: true
  output: demos/scrutineer-website/scrutineer.log
